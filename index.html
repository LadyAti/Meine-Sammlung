<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meine Sammlung</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#050505" />
</head>

<body>
  <div class="app">

    <header class="app-header">
      <div>
        <p class="eyebrow">LadyAti Collection</p>
        <h1>Meine Sammlung</h1>
      </div>
      <div class="profile-badge">LA</div>
    </header>

    <section class="hero">
      <h2>Digitales Sammelalbum</h2>
      <p>Blättere durch deine eigenen Karten wie in einem echten Premium-Sammelordner.</p>
    </section>

    <main class="album-grid">

      <button class="album-card" onclick="openAlbum('Jack Daniel’s')">
        <span class="album-icon">🥃</span>
        <h3>Jack Daniel’s</h3>
        <p>Collector Cards</p>
        <div class="progress"><span style="width: 10%"></span></div>
      </button>

      <button class="album-card" onclick="openAlbum('Hard Rock Pins')">
        <span class="album-icon">🎸</span>
        <h3>Hard Rock Pins</h3>
        <p>Social Cards</p>
        <div class="progress"><span style="width: 20%"></span></div>
      </button>

      <button class="album-card" onclick="openAlbum('IONITY Stops')">
        <span class="album-icon">⚡</span>
        <h3>IONITY Stops</h3>
        <p>Ladestopps</p>
        <div class="progress"><span style="width: 35%"></span></div>
      </button>

      <button class="album-card" onclick="openAlbum('DJack')">
        <span class="album-icon">🐶</span>
        <h3>DJack</h3>
        <p>Patientenakte & Erinnerungen</p>
        <div class="progress"><span style="width: 5%"></span></div>
      </button>

    </main>

    <nav class="bottom-nav">
      <button>📖<span>Alben</span></button>
      <button>🔍<span>Suche</span></button>
      <button>🏆<span>Erfolge</span></button>
      <button>⚙️<span>Mehr</span></button>
    </nav>

  </div>

  <script src="script.js"></script>
</body>
</html>
